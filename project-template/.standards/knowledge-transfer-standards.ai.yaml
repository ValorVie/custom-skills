# Knowledge Transfer Standards - AI Optimized
# Source: core/knowledge-transfer-standards.md

id: knowledge-transfer-standards
meta:
  version: "1.0.0"
  updated: "2026-03-31"
  source: core/knowledge-transfer-standards.md
  description: Onboarding, handoff, bus factor assessment, and code tour

onboarding:
  roadmap:
    week_1: "Environment & culture — setup, team norms"
    week_2: "Architecture & code — system overview, code tour"
    week_3: "Process & tools — CI/CD, deploy, monitoring, first PR"
    week_4: "Independent contribution — small task, buddy assessment"
  checklist_categories:
    - "Account access (Git, CI/CD, monitoring, cloud, chat)"
    - "Environment setup (IDE, VPN, DB access)"
    - "Documentation (README, architecture, API docs, CLAUDE.md)"
    - "Meetings (Buddy 1:1, team intro, architecture overview)"
    - "First tasks (Good First Issue, Code Tour completion)"

handoff:
  items:
    - "Ownership list — all owned modules/services/processes (4 weeks before)"
    - "Tacit knowledge recording — 'only I know' operations (3 weeks)"
    - "WIP transfer — unfinished tasks, PRs, incidents (2 weeks)"
    - "Account/permission transfer — owner rights, API key rotation (1 week)"
    - "Runbook update — verify related runbooks current (1 week)"
    - "Buddy pairing — pair sessions with successor (2 weeks)"
  knowledge_record_fields:
    - "Topic (what knowledge)"
    - "Context (when needed)"
    - "Steps (how to do it)"
    - "Pitfalls (common traps)"
    - "Resources (links to code, docs, runbooks)"

bus_factor:
  metrics:
    people_count: "1=high risk, 2=medium, 3+=low"
    doc_coverage: "<30%=high, 30-70%=medium, >70%=low"
    last_sharing: ">6mo=high, 3-6mo=medium, <3mo=low"
  spreading_strategies:
    - "Pair Programming"
    - "Tech Talk"
    - "Documentation"
    - "Code Review rotation"
    - "On-call rotation"

code_tour:
  routes:
    - "Quick Start (entry point, config, startup)"
    - "Request Flow (ingress to response)"
    - "Data Flow (create → store → query)"
    - "Deploy Flow (PR to production)"
    - "Key Decisions (ADR links)"
  update_rules:
    entry_route_change: MUST
    internal_refactor: "No update needed"
    new_major_feature: SHOULD
