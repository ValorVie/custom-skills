# Test Data Management Standards - AI Optimized
# Source: core/test-data-standards.md

id: test-data-standards
meta:
  version: "1.0.0"
  updated: "2026-03-31"
  source: core/test-data-standards.md
  description: Test data strategies, anonymization, fixtures, isolation, and anti-patterns

strategies_by_level:
  unit_tests: "Inline data — hardcoded in test, minimal, focused"
  integration_tests: "Fixture files — JSON/YAML/SQL files, shared across tests"
  e2e_tests: "Seed scripts — database seeding, realistic data sets"

anonymization:
  name: "Replace with fake names (Faker library)"
  email: "Hash or replace domain (user@example.com)"
  phone: "Replace with fake numbers"
  address: "Replace with generic addresses"
  id: "Generate new sequential/UUID IDs"

fixture_sync: "Fixtures MUST be updated when schema migrations change"

isolation:
  principle: "Each test creates and destroys its own data"
  rules:
    - "No shared mutable state between tests"
    - "Tests must pass in any order"
    - "Parallel-safe by default"

factory_pattern:
  purpose: "Build test objects with sensible defaults, overridable"
  features:
    - "Default values for all required fields"
    - "Override any field per test"
    - "Create related/associated data"

anti_patterns:
  - "Shared mutable data between tests"
  - "Hardcoded IDs (brittle, order-dependent)"
  - "Depending on test execution order"
  - "Using production data without anonymization"
