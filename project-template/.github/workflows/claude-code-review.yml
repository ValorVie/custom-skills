name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # 檔案類型過濾（目前停用，如需啟用請取消註解）
    # paths:
    #   - "**/*.py"
    #   - "**/*.ts"
    #   - "**/*.tsx"
    #   - "**/*.js"
    #   - "**/*.jsx"
    #   - "**/*.go"
    #   - "**/*.rs"

jobs:
  claude-review:
    # 排除 Draft PR
    if: github.event.pull_request.draft == false

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # 需要 write 權限才能發表評論
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            請審查此 Pull Request #${{ github.event.pull_request.number }}

            ## 任務
            1. 使用 `gh pr view ${{ github.event.pull_request.number }} --json body -q .body` 讀取 PR 描述
            2. 若 PR 描述包含 **"Pre-Review Summary"** 或 **"Design Notes"** 段落，這是提交者透過本地雙視角審查產生的脈絡說明。你必須：
               - 先閱讀 Design Notes 理解專案決策背景
               - 先閱讀 Review Decisions 理解已仲裁的分歧（若存在）
               - 審查時將這些脈絡納入考量，避免重複質疑已有合理解釋的模式
            3. 使用 `gh pr diff ${{ github.event.pull_request.number }}` 查看變更
            4. 根據 .github/prompts/code-review.md 的標準進行審查
            5. **重要**：審查完成後，必須使用以下命令發表評論：
               ```
               gh pr comment ${{ github.event.pull_request.number }} --body "你的審查結果"
               ```

            ## 審查原則
            - 若 PR 描述的 Design Notes 已解釋某寫法的專案脈絡，且你認為解釋合理，則不應將該寫法標記為問題
            - 若你仍然認為該寫法有問題（即使有 Design Notes 解釋），請明確說明你不同意的理由，並引用 Design Notes 中的解釋加以回應

            ## 回覆格式
            - 語言：繁體中文（專有名詞保留原文）
            - 包含：摘要、優點、建議改進項目、結論
          # 授權工具執行
          claude_args: |
            --allowedTools Bash,Read,Write,Edit,Glob,Grep
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
