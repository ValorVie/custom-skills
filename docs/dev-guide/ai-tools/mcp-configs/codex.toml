# Global config path: ~/.codex/config.toml
# Project config path: ./.codex/config.toml (trusted projects only)

[mcp_servers.context7]
command = "npx"
args = ["@upstash/context7-mcp"]

[mcp_servers.snyk]
command = "/opt/homebrew/bin/snyk"
args = ["mcp", "-t", "stdio"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.n8n-mcp]
command = "npx"
args = ["-y", "n8n-mcp"]

[mcp_servers.n8n-mcp.env]
MCP_MODE = "stdio"
LOG_LEVEL = "error"
DISABLE_CONSOLE_OUTPUT = "true"
N8N_API_URL = "https://${DOMAIN}"
N8N_API_KEY = "${API_KEY}"

[mcp_servers.postgres-mcp]
command = "uv"
args = ["run", "postgres-mcp", "--access-mode=unrestricted"]

[mcp_servers.postgres-mcp.env]
DATABASE_URI = "postgresql://${USER}:${PASSWORD}@${IP}:${PORT}/${DB}"
