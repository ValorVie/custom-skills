# Forward Derivation Standards - AI Optimized
# Source: core/forward-derivation-standards.md

id: forward-derivation
meta:
  version: "1.1.0"
  updated: "2026-04-01"
  source: core/forward-derivation-standards.md
  description: Standards for deriving BDD, TDD, IT, E2E, ATDD, and Contract tests from approved SDD specifications

# Core Workflow
workflow:
  name: Forward Derivation Pipeline
  stages:
    - stage: SPEC_PARSING
      description: Parse approved specification and extract Acceptance Criteria
      output: Structured AC list
      certainty: "[Source]"

    - stage: BDD_DERIVATION
      description: Transform AC to Gherkin scenarios
      output: Feature file (.feature)
      certainty: "[Derived]/[Generated]"

    - stage: TDD_DERIVATION
      description: Generate unit test skeleton from AC
      output: Test file (.test.*)
      certainty: "[Generated]"

    - stage: IT_DERIVATION
      description: Generate integration test skeleton from AC or .feature
      output: Integration test file (.it.test.*)
      certainty: "[Generated]"

    - stage: E2E_DERIVATION
      description: Generate E2E test skeleton from AC or .feature
      output: E2E test file (.e2e.test.*)
      certainty: "[Generated]"

    - stage: ATDD_DERIVATION
      description: Create acceptance test tables from AC
      output: Acceptance test document (.md)
      certainty: "[Generated]"

    - stage: HUMAN_REVIEW
      description: Review and refine generated outputs
      output: Validated test structures
      certainty: "[Confirmed]"

# Test Level Decision Tree
test_level_decision_tree:
  question_1: "AC involves UI operations (click, navigate, redirect, form)?"
  yes_1: "E2E Test"
  no_1_question: "AC involves multi-service interaction (API, DB, Queue)?"
  yes_2: "Integration Test"
  no_2: "Unit Test (already covered by /derive-tdd)"
  external_api: "Integration Test"

# Test Level Configuration Awareness
test_levels_config:
  description: "/derive SHOULD check project test_levels before generating"
  sources:
    - ".standards/.uds.manifest.json → options.test_levels"
    - "uds-manifest.json → test_levels"
    - "Default: all levels"
  mapping:
    unit-testing: "/derive-tdd (always included)"
    integration-testing: "/derive-it"
    system-testing: "/derive-it (broader integration)"
    e2e-testing: "/derive-e2e"
  always_generated: "BDD (.feature), ATDD (acceptance.md), Contracts (contract.json)"
  skip_message: "Skipping {level} derivation — not in project test_levels configuration"

# Integration Test Templates
it_templates:
  http_api:
    sections: [Setup, Request, Assert, Teardown]
    description: "REST/GraphQL endpoint testing"
  database:
    sections: [Seed, Execute, Assert State, Cleanup]
    description: "Data layer operation testing"
  message_queue:
    sections: [Publish, Consume, Assert Processing, Cleanup]
    description: "Event-driven system testing"
  service_to_service:
    sections: [Setup, Call, Mock Dependencies, Assert]
    description: "Microservice interaction testing"

# E2E Test Template
e2e_template:
  sections: [Environment, Navigation, Interaction, Assertion, Cleanup]
  gherkin_mapping:
    Given: "Setup + Navigation"
    When: "Interaction"
    Then: "Assertion"

# AC Level Summary
ac_level_summary:
  description: "Output AC Level Summary at end of /derive all"
  format: "| AC | Suggested Level | Rationale |"

# Certainty Framework
certainty_framework:
  tags:
    - tag: "[Source]"
      definition: Directly from specification content
    - tag: "[Derived]"
      definition: Transformed from SPEC content
    - tag: "[Generated]"
      definition: AI-generated structure
    - tag: "[TODO]"
      definition: Placeholder requiring human implementation

# Anti-Hallucination Rules
anti_hallucination:
  fundamental_rule: Only derive what exists in specification
  1_to_1_mapping: "N AC → exactly N scenarios/test groups per level"
  forbidden:
    - Adding scenarios not in AC
    - Inventing test cases beyond AC scope
    - Fabricating edge cases not specified

# Commands
commands:
  - command: "/derive-bdd"
    input: SPEC-XXX.md
    output: .feature
    purpose: AC to Gherkin scenarios
  - command: "/derive-tdd"
    input: SPEC-XXX.md
    output: .test.*
    purpose: AC to Unit test skeletons
  - command: "/derive-it"
    input: "SPEC-XXX.md or .feature"
    output: .it.test.*
    purpose: AC to Integration test skeletons
  - command: "/derive-e2e"
    input: "SPEC-XXX.md or .feature"
    output: .e2e.test.*
    purpose: AC to E2E test skeletons
  - command: "/derive-atdd"
    input: SPEC-XXX.md
    output: acceptance.md
    purpose: AC to acceptance test tables
  - command: "/derive-contracts"
    input: SPEC-XXX.md
    output: contract.json
    purpose: AC to contract definitions
  - command: "/derive-all"
    input: SPEC-XXX.md
    output: All above
    purpose: "Full pipeline (BDD + TDD + IT + E2E + ATDD + Contracts)"

# Rules for AI
rules:
  - id: approved-spec-only
    instruction: Only derive from approved specifications
    priority: required
  - id: read-before-derive
    instruction: Read entire specification before generating
    priority: required
  - id: strict-1-to-1
    instruction: One scenario/test group per AC
    priority: required
  - id: source-attribution
    instruction: Include source reference on every item
    priority: required
  - id: check-test-levels
    instruction: Check project test_levels config before deriving; skip unconfigured levels
    priority: recommended
  - id: ac-level-summary
    instruction: Output AC Level Summary table at end of /derive all
    priority: recommended

related_standards:
