# Documentation Writing Standards - AI Optimized
# Source: core/documentation-writing-standards.md

id: documentation-writing-standards
meta:
  version: "1.1.0"
  updated: "2026-03-17"
  source: core/documentation-writing-standards.md
  description: Documentation requirements based on project types (enhanced ADR, LLM writing, quality metrics, translation-friendly)

project_types:
  new_project:
    description: Building software from scratch
    required:
      - README.md
      - ARCHITECTURE.md
      - DEPLOYMENT.md
      - CHANGELOG.md
    recommended:
      - API.md (if exposing external APIs)
      - DATABASE.md (if using databases)
      - ADR/ (record important decisions)

  refactoring:
    description: Improving existing system without changing external behavior
    required:
      - README.md
      - ARCHITECTURE.md
      - API.md (if applicable)
      - DATABASE.md (if applicable)
      - DEPLOYMENT.md
      - MIGRATION.md
      - ADR/
      - CHANGELOG.md
    key_points:
      - MIGRATION.md must include rollback plan
      - ADR must document why refactor and why this approach

  migration:
    description: Moving system to another environment/platform
    required:
      - README.md
      - ARCHITECTURE.md
      - API.md
      - DATABASE.md
      - DEPLOYMENT.md
      - MIGRATION.md
      - ADR/
      - CHANGELOG.md
    key_points:
      - MIGRATION.md is the core document
      - Must include data migration verification
      - Must include rollback plan
      - Must include integration partner notification

  maintenance:
    description: Day-to-day maintenance, bug fixes, minor enhancements
    required:
      - README.md
      - CHANGELOG.md
    recommended:
      - Update other documents based on change scope

document_categories:
  architecture:
    file: ARCHITECTURE.md
    required_sections:
      - System Overview (purpose, scope, main functions)
      - Architecture Diagram (Mermaid or ASCII)
      - Module Description (responsibilities, dependencies)
      - Technology Stack (frameworks, languages, versions)
      - Data Flow (main business process)
    recommended_sections:
      - Deployment Architecture
      - Design Decisions (or link to ADR)

  api:
    file: API.md
    required_sections:
      - API Overview (version, base URL, authentication)
      - Authentication (token acquisition, expiration)
      - Endpoint List
      - Endpoint Specifications (request/response format)
      - Error Code Reference
    recommended_sections:
      - Code Examples
      - Rate Limiting

  database:
    file: DATABASE.md
    required_sections:
      - Database Overview (type, version, connection)
      - ER Diagram
      - Table List
      - Table Specifications (column definitions)
      - Index Documentation
      - Migration Scripts
    recommended_sections:
      - Backup Strategy

  deployment:
    file: DEPLOYMENT.md
    required_sections:
      - Environment Requirements
      - Installation Steps
      - Configuration
      - Verification
      - Troubleshooting
    recommended_sections:
      - Monitoring
      - Scaling Guide

  migration:
    file: MIGRATION.md
    required_sections:
      - Migration Overview (goals, scope, timeline)
      - Prerequisites
      - Migration Steps
      - Verification Checklist
      - Rollback Plan
      - Backward Compatibility
    recommended_sections:
      - Integration Partner Notification

  adr:
    directory: docs/ADR/
    naming: "NNN-kebab-case-title.md"
    required_sections:
      - Title
      - Date (YYYY-MM-DD)
      - Status (proposed/accepted/deprecated/superseded)
      - Deciders (who participated)
      - Context
      - Decision
      - Consequences
    recommended_sections:
      - Drivers (key factors)
      - Alternatives Considered
      - Related ADRs (supersedes/superseded-by)
    lifecycle: "proposed → accepted → [deprecated | superseded]"
    decision_matrix:
      description: "When to write ADR (impact × reversibility)"
      adr_required: "High impact + Hard to reverse"
      optional: "High impact + Easy to reverse OR Low impact + Hard to reverse"
      not_needed: "Low impact + Easy to reverse"

llm_writing:
  rules:
    - Short paragraphs (3-5 lines)
    - Consistent terminology throughout
    - Always specify language in code blocks
    - Avoid pronoun ambiguity across paragraphs
    - Each H2 section should be context-self-sufficient
    - State explicit negation when distinctions matter
  chunking:
    max_h2_size: "4K-8K tokens (~3000 words)"
    principle: "One topic per H2, front-load summaries"
  retrieval_metadata: [title, scope, difficulty, tags, last_validated]

translation_friendly:
  writing_rules:
    - Complete sentences (avoid fragments)
    - Avoid idioms and slang
    - Consistent terminology (follow glossary)
    - Simple SVO sentence structure
    - Explicit references (avoid ambiguous pronouns)
  glossary_file: glossary.md
  translation_status_fields: [translation_status, source_version, source_hash, translated_by, last_synced]

quality_metrics:
  leading:
    - name: Coverage
      target: "≥90% public APIs documented"
    - name: Freshness
      target: "All docs updated within 90 days"
    - name: Link Health
      target: "100% valid links"
    - name: Example Validity
      target: "100% code examples run"
    - name: Structure Compliance
      target: "All docs have required sections"
  lagging:
    - Support ticket reduction
    - Onboarding time
    - Doc-related PR comments
  tools: [markdown-link-check, lychee, remark-lint, textstat, vale]

rules:
  - id: llm-writing
    trigger: writing documentation
    instruction: Follow LLM-optimized writing rules (short paragraphs, consistent terms, context self-sufficiency)
    priority: recommended

  - id: translation-friendly
    trigger: writing documentation for multilingual projects
    instruction: Use complete sentences, avoid idioms, follow glossary, use simple sentence structure
    priority: recommended

  - id: quality-metrics
    trigger: documentation review
    instruction: Check documentation quality metrics (coverage, freshness, link health)
    priority: recommended

  - id: adr-enhanced
    trigger: creating ADR
    instruction: Include Date, Deciders, Drivers fields; use decision matrix (impact × reversibility) to decide if ADR is needed
    priority: required

  - id: project-type-docs
    trigger: starting a project
    instruction: Identify project type and create required documents
    priority: required

  - id: sync-updates
    trigger: changing code
    instruction: Update documentation when code changes
    priority: required

  - id: version-marking
    trigger: creating documentation
    instruction: Mark version and update date at top
    priority: required

  - id: review-inclusion
    trigger: submitting code review
    instruction: Include doc changes in code review
    priority: required

  - id: periodic-review
    trigger: quarterly
    instruction: Review docs for staleness
    priority: recommended

quality_standards:
  format:
    language: English
    encoding: UTF-8
    line_length: "≤120 characters"
    diagrams: Prefer Mermaid, then ASCII Art
    links: Use relative paths for internal links

  review_checklist:
    - Required sections complete
    - No outdated or incorrect information
    - All links working
    - Examples are executable/accurate
    - Format follows standards

quick_reference:
  requirements_matrix:
    columns: [Document, New, Refactor, Migration, Maintenance]
    rows:
      - [README.md, Required, Required, Required, Required]
      - [ARCHITECTURE.md, Required, Required, Required, Recommended]
      - [API.md, If applicable, Required, Required, Recommended]
      - [DATABASE.md, If applicable, Required, Required, Recommended]
      - [DEPLOYMENT.md, Required, Required, Required, Recommended]
      - [MIGRATION.md, Not needed, Required, Required, Not needed]
      - [ADR/, Recommended, Required, Required, If applicable]
      - [CHANGELOG.md, Required, Required, Required, Required]
