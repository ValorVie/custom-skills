version: 1
source: everything-claude-code
source_path: ~/.config/everything-claude-code/

# ECC 選擇性分發規則
# 在 ai-dev clone 時，從 ~/.config/everything-claude-code/ 選擇性分發資源到各平台
#
# skills: 所有平台共用同一來源路徑
# commands/agents: 各平台使用獨立來源路徑（ECC 為不同平台維護獨立版本）

distribute:
  skills:
    source_path: skills/
    targets:
      - claude
      - antigravity
      - opencode
      - gemini
      - codex
    enabled:
      # 白名單機制：僅列出名稱的 skill 會被分發到 targets 平台。
      # ECC 上游新增的 skill 預設不分發，必須顯式加入此清單。
      # 維護方式：執行 ai-dev ecc audit 偵測 ECC 與 ecc-catalog.yaml 差異，
      # 將要啟用的項目補入此處。skill 分類請參考 upstream/ecc-catalog.yaml。

      # === 通用工程方法論 (engineering-methods) — 14 個 ===
      - agentic-engineering
      - ai-first-engineering
      - architecture-decision-records
      - coding-standards
      - context-budget
      - council
      - error-handling
      - hexagonal-architecture
      - iterative-retrieval
      - plankton-code-quality
      - search-first
      - skill-stocktake
      - tdd-workflow
      - verification-loop

      # === Agent / LLM 系統建構 (agent-llm) — 15 個 ===
      - agent-architecture-audit
      - agent-eval
      - agent-harness-construction
      - agent-introspection-debugging
      - autonomous-agent-harness
      - autonomous-loops
      - continuous-agent-loop
      - continuous-learning-v2
      - enterprise-agent-ops
      - eval-harness
      - mcp-server-patterns
      - mle-workflow
      - plan-orchestrate
      - prompt-optimizer
      - team-builder

      # === 前端、UI、動畫 (frontend-ui) — 7 個 ===
      - accessibility
      - design-system
      - frontend-patterns
      - nextjs-turbopack
      - ui-demo
      - ui-to-vue
      - vite-patterns

      # === 後端、框架、執行期 (backend-frameworks) — 5 個 ===
      - backend-patterns
      - bun-runtime
      - fastapi-patterns
      - python-patterns
      - python-testing

      # === 資料儲存、資料庫 (data-storage) — 4 個 ===
      - database-migrations
      - mysql-patterns
      - postgres-patterns
      - redis-patterns

      # === 網路、Homelab、基礎設施 (network-infra) — 7 個 ===
      - deployment-patterns
      - docker-patterns
      - flox-environments
      - homelab-network-readiness
      - homelab-network-setup
      - network-config-validation
      - network-interface-health

      # === 測試、QA、E2E (testing-qa) — 6 個 ===
      - ai-regression-testing
      - benchmark
      - browser-qa
      - canary-watch
      - e2e-testing
      - production-audit

      # === 文件、知識管理、研究 (docs-knowledge) — 9 個 ===
      - brand-voice
      - code-tour
      - codebase-onboarding
      - deep-research
      - documentation-lookup
      - exa-search
      - market-research
      - research-ops

      # === 工具、Ops、整合 (tools-ops) — 13 個 ===
      - api-connector-builder
      - api-design
      - automation-audit-ops
      - dashboard-builder
      - data-scraper-agent
      - ecc-guide
      - gateguard
      - github-ops
      - hookify-rules
      - jira-integration
      - opensource-pipeline
      - safety-guard
      - terminal-ops

      # === 規範、流程、RFC、PR (process-rfc) — 5 個 ===
      - blueprint
      - git-workflow
      - product-capability
      - product-lens
      - project-flow-ops

      # === 安全 (security) — 4 個 ===
      - rules-distill
      - security-bounty-hunter
      - security-review
      - security-scan

      # === AI 工具、Token、媒體生成 (ai-cost-tooling) — 6 個 ===
      - click-path-audit
      - content-hash-cache-pattern
      - cost-aware-llm-pipeline
      - remotion-video-creation
      - repo-scan
      - token-budget-advisor

  commands:
    claude:
      source_path: commands/
    opencode:
      source_path: .opencode/commands/
    # Gemini 使用 .toml 格式，與 ECC .md 格式不相容，不分發
    # Codex 不支援 commands，不分發

  agents:
    claude:
      source_path: agents/
    opencode:
      source_path: .opencode/prompts/agents/
    gemini:
      source_path: agents/
    # Codex 不支援 agents，不分發

# 分發 skills 時要跳過的目錄名稱
skip_directories: []

# 排除特定資源不分發（commands / agents 維持黑名單；skills 改用 distribute.skills.enabled 白名單）
exclude:
  commands:
    claude: []
    opencode: []
  agents:
    claude: []
    opencode: []
    gemini: []
