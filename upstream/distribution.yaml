    # Kotlin / KMP
    - kotlin-coroutines-flows
    - kotlin-exposed-patterns
    - kotlin-ktor-patterns
    - kotlin-patterns
    - kotlin-testing
    # Perl
    - perl-patterns
    - perl-security
    - perl-testing
    # Rust
